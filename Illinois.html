// Normalization function
function normalize(str) {
    if (!str) return "";
    return str.toLowerCase()
              .replace(/school district/g, "")
              .replace(/community consolidated/g, "")
              .replace(/community unit/g, "")
              .replace(/township/g, "")
              .replace(/sd/g, "")
              .replace(/cusd/g, "")
              .replace(/[^a-z0-9]/g, "")
              .trim();
}

var lookup = {};
for (var originalName in jobLinks) {
    lookup[normalize(originalName)] = jobLinks[originalName];
}

// Fetch Boundaries (Illinois is '17', Pennsylvania is '42')
fetch("https://services1.arcgis.com/Ua5sjt3LWTPigjyD/arcgis/rest/services/School_Districts_Current/FeatureServer/0/query?where=STATEFP='17'&outFields=*&f=geojson")
.then(res => res.json())
.then(data => {

    // 1. Define Style Function
    function getStyle(feature) {
        var name = feature.properties.NAME;
        var hasLink = lookup.hasOwnProperty(normalize(name));
        return {
            fillColor: hasLink ? "#2ecc71" : "#e6e6e6",
            color: "#555555",
            weight: 1,
            fillOpacity: 0.6
        };
    }

    // 2. Create the Layer FIRST (so it exists for the resetStyle)
    var geojsonLayer = L.geoJson(data, {
        style: getStyle,
        onEachFeature: function(feature, layer) {
            var name = feature.properties.NAME;
            var normName = normalize(name);
            var link = lookup[normName];

            layer.bindTooltip("<b>" + name + "</b>" + (link ? "<br><small>Click to view jobs</small>" : ""), { sticky: true });

            layer.on({
                mouseover: function(e) { 
                    e.target.setStyle({ fillColor: "#66ccff", fillOpacity: 0.9 }); 
                },
                mouseout: function(e) { 
                    geojsonLayer.resetStyle(e.target); 
                },
                click: function () {
                    if (link && link !== "") {
                        // Log to Google Analytics
                        if (typeof gtag === "function") {
                            gtag('event', 'district_link_click', {
                                'district_name': name,
                                'state': 'Illinois'
                            });
                        }
                        // Open Link
                        window.open(link, "_blank");
                    }
                }
            });
        }
    }).addTo(map);
});
