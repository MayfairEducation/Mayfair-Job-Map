<!DOCTYPE html>
<html>
<head>
    <title>Nevada School Districts Job Map</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-41JX7WMDFE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-41JX7WMDFE');
    </script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        h1 { text-align: center; margin: 20px 0; }
        #map { height: 85vh; width: 95%; margin: auto; border: 1px solid #ccc; }
        button { margin-left: 2.5%; margin-bottom: 10px; padding: 8px 15px; cursor: pointer; }
        .leaflet-control-geocoder { border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<h1>Nevada School Districts Job Search</h1>
<button onclick="window.location.href='index.html'">Back to US Map</button>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
// Nevada-wide view
var map = L.map('map').setView([38.5, -117.0], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Search Bar Logic
var geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Search Zip or Address...",
    collapsed: false 
})
.on('markgeocode', function(e) {
    var bbox = e.geocode.bbox;
    map.fitBounds(bbox);
})
.addTo(map);

// Your District Links List
var jobLinks = {
    "Carson City School District": "https://jobs.redroverk12.com/org/carsoncityschools",
    "Churchill County School District": "https://www.applitrack.com/churchill/onlineapp/default.aspx?all=1",
    "Clark County School District": "https://ccsd.taleo.net/careersection/2/jobsearch.ftl?lang=en",
    "Douglas County School District": "https://www.applitrack.com/dcsd/onlineapp/default.aspx?all=1",
    "Elko County School District": "https://elko.schoolspring.com/",
    "Esmeralda County School District": "https://www.esmeraldacountyschools.com/en-US/employment-opportunities-6a623230",
    "Eureka County School District": "https://www.eureka.k12.nv.us/employment/job_opportunities",
    "Humboldt County School District": "https://hcsdnv.schoolspring.com/",
    "Lander County School District": "https://www.lander.k12.nv.us/careers/available-positions",
    "Lincoln County School District": "https://www.lcsdnv.com/page/Career-Opportunities/15259/Index.html",
    "Lyon County School District": "https://www.applitrack.com/Lyoncsd/onlineapp/default.aspx?all=1",
    "Mineral County School District": "https://www.applitrack.com/nvmcsd/onlineapp/default.aspx?all=1",
    "Nye County School District": "https://www.applitrack.com/nye/onlineapp/default.aspx?all=1",
    "Pershing County School District": "https://www.pcsdnv.com/page/employment",
    "Storey County School District": "https://www.storeynv.com/careers",
    "Washoe County School District": "https://washoe.atenterprise.powerschool.com/ats/job_board?APPLICANT_TYPE_ID=00000001&COMPANY_ID=00004845",
    "White Pine County School District": "https://www.whitepine.k12.nv.us/team"
};

// Normalization function (Matches your IL logic)
function normalize(str) {
    if (!str) return "";
    return str.toLowerCase()
              .replace(/school district/g, "")
              .replace(/county/g, "")
              .replace(/[^a-z0-9]/g, "")
              .trim();
}

var lookup = {};
for (var originalName in jobLinks) {
    lookup[normalize(originalName)] = jobLinks[originalName];
}

// Fetch Nevada County Boundaries
fetch("https://raw.githubusercontent.com/codeforamerica/click_near_me/master/public/data/nevada.json")
.then(res => res.json())
.then(data => {

    var geojsonLayer = L.geoJson(data, {
        style: function(feature) {
            var name = feature.properties.name || feature.properties.NAME;
            var hasLink = lookup.hasOwnProperty(normalize(name));
            return {
                fillColor: hasLink ? "#2ecc71" : "#e6e6e6",
                color: "#555555",
                weight: 1,
                fillOpacity: 0.6
            };
        },
        onEachFeature: function(feature, layer) {
            var name = feature.properties.name || feature.properties.NAME;
            var normName = normalize(name);
            var link = lookup[normName];

            layer.bindTooltip("<b>" + name + "</b>" + (link ? "<br><small>Click to view jobs</small>" : ""), { sticky: true });

            layer.on({
                mouseover: function(e) { 
                    e.target.setStyle({ fillColor: "#66ccff", fillOpacity: 0.9 }); 
                },
                mouseout: function(e) { 
                    geojsonLayer.resetStyle(e.target); 
                },
                click: function(e) {
                    // Tracking
                    gtag('event', 'district_link_click', {
                        'district_name': name,
                        'state': 'Nevada'
                    });

                    if (link) {
                        window.open(link, '_blank');
                    }
                }
            });
        }
    }).addTo(map);
});
</script>

</body>
</html>
